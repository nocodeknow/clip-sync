name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android_app/**'
  workflow_dispatch: # Allows manual trigger from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Let Flutter generate all Android project scaffolding for the exact
      # installed Flutter version. It won't overwrite files that already exist
      # (our lib/ code and pubspec.yaml are safe).
      - name: Generate Android project files
        working-directory: android_app
        run: flutter create . --project-name clipsync --org com.nocodeknow --platforms android

      # flutter create overwrites AndroidManifest.xml — restore our custom one
      # which has the extra network permissions for WebSocket + UDP broadcast.
      - name: Restore custom AndroidManifest
        run: cp android_app/AndroidManifest.xml android_app/android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipSync-release
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
