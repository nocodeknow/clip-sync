name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android_app/**'
  workflow_dispatch: # Allows manual trigger from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create local.properties
        working-directory: android_app/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Get dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipSync-release
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
